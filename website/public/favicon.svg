<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <!-- Tunnel rings - concentric arcs suggesting depth/burrow -->
  <ellipse cx="64" cy="68" rx="44" ry="40" fill="none" stroke="#2dd4bf" stroke-width="4" stroke-opacity="0.15"/>
  <ellipse cx="64" cy="68" rx="32" ry="29" fill="none" stroke="#2dd4bf" stroke-width="4" stroke-opacity="0.35"/>
  <ellipse cx="64" cy="68" rx="20" ry="18" fill="none" stroke="#2dd4bf" stroke-width="4" stroke-opacity="0.6"/>
  <!-- Center dot - the light at the end of the tunnel -->
  <circle cx="64" cy="68" r="7" fill="#2dd4bf"/>
  <!-- Down arrow at top - traffic going through -->
  <path d="M56 28 L64 38 L72 28" fill="none" stroke="#2dd4bf" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
