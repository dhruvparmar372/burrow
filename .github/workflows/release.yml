name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: cd package && bun install --frozen-lockfile

      - name: Build all binaries
        run: |
          cd package
          bun build --compile --target=bun-linux-x64 src/index.ts --outfile burrow-linux-x64
          bun build --compile --target=bun-linux-arm64 src/index.ts --outfile burrow-linux-arm64
          bun build --compile --target=bun-darwin-arm64 src/index.ts --outfile burrow-darwin-arm64
          bun build --compile --target=bun-darwin-x64 src/index.ts --outfile burrow-darwin-x64

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            package/burrow-linux-x64
            package/burrow-linux-arm64
            package/burrow-darwin-arm64
            package/burrow-darwin-x64
